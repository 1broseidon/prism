version: "2"

# golangci-lint v2 configuration for Prism
#
# v0.1.0 baseline: tuned to catch real bugs and security issues without drowning
# in style picks. The noisy gocritic style/perf tags and gocyclo are off until
# we pay down the post-v0.1 cleanup pass (tracked in issues).

run:
  go: "1.26"
  timeout: 5m

linters:
  enable:
    # Correctness
    - govet          # go vet
    - ineffassign    # unused assignments
    - staticcheck    # advanced static analysis
    - unused         # unused code
    - errcheck       # unchecked errors
    - errorlint      # error wrapping best practices
    - bodyclose      # unclosed HTTP response bodies
    - noctx          # HTTP/SQL calls without context

    # Hygiene
    - misspell       # spelling in comments/strings
    - unconvert      # unnecessary type conversions
    - whitespace     # unnecessary whitespace

    # Security
    - gosec          # security issues

    # Style (diagnostic only — see settings.gocritic)
    - gocritic

  settings:
    gocritic:
      # Only diagnostic checks: real bugs and gotchas (exitAfterDefer, etc.).
      # `style` and `performance` produce subjective findings (rangeValCopy,
      # hugeParam, unnamedResult) — re-enable post-v0.1 cleanup pass.
      enabled-tags:
        - diagnostic

    misspell:
      locale: US

    govet:
      enable-all: true
      disable:
        - fieldalignment  # sacrifices readability for minor memory savings
        - shadow          # too noisy on intentional shadowing of err/ctx

  exclusions:
    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
          - gocritic
          - noctx

      # internal/analytics/eventstore.go: v0.2 cleanup target — context
      # propagation for sql.DB calls and rows.Close error handling. The query
      # builders are parameterized; G202 string-concat warnings are false
      # positives (column names come from a closed enum, not user input).
      - path: internal/analytics/eventstore\.go
        linters:
          - noctx
          - errcheck
          - gosec

      # internal/authserver/grants_store.go: KV key-prefix constants
      # (grant_template_hashes/, grant_bindings/, etc.) trigger G101 because
      # the string "_hash" or "_ref" looks like a credential to gosec. They
      # are not — they are bbolt key namespaces.
      - path: internal/authserver/grants_store\.go
        linters:
          - gosec

      # internal/authserver/stepup.go: step-up auth cookie defaults to
      # HttpOnly + SameSite=Strict; the Secure flag is set at runtime when
      # the gateway terminates TLS or sits behind a TLS-terminating proxy
      # (handled by trust_proxy_headers + the network settings page).
      - path: internal/authserver/stepup\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt

  settings:
    gofmt:
      simplify: true

output:
  sort-order:
    - linter
    - file
