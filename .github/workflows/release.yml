name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full image: gateway + bridge in one. The recommended default.
          - image: ghcr.io/${{ github.repository_owner }}/prism
            dockerfile: Dockerfile
            description: Prism gateway with the bundled bridge.
          # Optional bridge-only image for sidecar setups.
          - image: ghcr.io/${{ github.repository_owner }}/prism-bridge
            dockerfile: cmd/prism-bridge/Dockerfile
            description: Standalone prism-bridge (stdio↔HTTP adapter).
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: internal/admin/web/package-lock.json

      - name: Build admin SPA
        working-directory: internal/admin/web
        run: |
          npm ci
          npm run build

      - name: Build binaries
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME}"
          out="prism-${version}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${out}"
          for cmd in prism prism-bridge prism-auth; do
            go build -tags mcp_go_client_oauth -trimpath \
              -ldflags "-s -w -X main.version=${version}" \
              -o "dist/${out}/${cmd}" "./cmd/${cmd}"
          done
          cp README.md LICENSE "dist/${out}/"
          tar -czf "dist/${out}.tar.gz" -C dist "${out}"
          (cd dist && sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*.tar.gz*

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [images, binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
